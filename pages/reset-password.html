<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Wimp-Drop</title>
      
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="notification-container"></div>

    <header>
        <div class="header-container">
            <div class="logo">
                <a href="../index.html" class="header-brand-link">Wimp<span>-Drop</span></a>
            </div>
            <nav class="header-nav"></nav>
            <div class="header-actions"><div data-auth-section></div></div>
        </div>
    </header>

    <section class="section auth-page">
        <div class="container auth-container">
            <div class="auth-card">
                <div class="auth-card-header text-center">
                    <span class="eyebrow">Secure access</span>
                    <h1>Choose a new password</h1>
                    <p>Create a strong password for your account.</p>
                </div>

                <form id="reset-password-form" onsubmit="handleResetPassword(event)">
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" name="password" placeholder="Enter a new password" required>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" name="confirmPassword" placeholder="Confirm your password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-large">Update password</button>
                </form>

                <p class="auth-footer">
                    <a href="login.html">Back to sign in</a>
                </p>
            </div>
        </div>
    </section>

    <footer class="page-footer">
        <div class="footer-content">
            <div class="footer-section">
                <h4>About Wimp-Drop</h4>
                <p>Your trusted global marketplace.</p>
            </div>
            <div class="footer-section">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>Legal</h4>
                <ul>
                    <li><a href="privacy.html">Privacy Policy</a></li>
                    <li><a href="terms.html">Terms</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Wimp-Drop. All rights reserved.</p>
        </div>
    </footer>

    <script>
        async function handleResetPassword(event) {
            event.preventDefault();
            const password = document.querySelector('input[name="password"]').value;
            const confirmPassword = document.querySelector('input[name="confirmPassword"]').value;
            const btn = document.querySelector('button[type="submit"]');

            if (!password || password.length < 6) {
                showNotification('Please choose a password with at least 6 characters.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showNotification('Passwords do not match.', 'error');
                return;
            }

            btn.textContent = 'Updating...';
            btn.disabled = true;

            try {
                if (window._supabaseReady) {
                    await window._supabaseReady;
                }

                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = hashParams.get('access_token');
                const refreshToken = hashParams.get('refresh_token');
                const code = new URLSearchParams(window.location.search).get('code');

                if (accessToken && refreshToken) {
                    await window._supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
                } else if (code && typeof window._supabase.auth.exchangeCodeForSession === 'function') {
                    await window._supabase.auth.exchangeCodeForSession(code);
                }

                const { error } = await window._supabase.auth.updateUser({ password });
                if (error) throw error;

                showNotification('Password updated successfully. You can now sign in.', 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (error) {
                const msg = (error?.message || error || 'Password update failed').toString();
                showNotification(msg, 'error');
            } finally {
                btn.textContent = 'Update password';
                btn.disabled = false;
            }
        }
    </script>
    <script src="../js/env.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/flutterwave.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
